<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeEase Chatbot</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #0ea5e9;
      --primary-2: #0369a1;
      --user: #0ea5e9;
      --bot: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 45%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 920px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .shell {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--card);
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
    }
    .title { font-size: 18px; font-weight: 700; }
    .badge {
      font-size: 12px;
      color: #14532d;
      background: #dcfce7;
      border: 1px solid #86efac;
      padding: 4px 8px;
      border-radius: 999px;
    }
    .chat {
      height: 62vh;
      min-height: 420px;
      overflow-y: auto;
      padding: 16px;
      background: #f8fafc;
    }
    .row {
      display: flex;
      margin-bottom: 12px;
    }
    .row.user { justify-content: flex-end; }
    .bubble {
      max-width: 78%;
      border-radius: 14px;
      padding: 10px 12px;
      white-space: pre-wrap;
      line-height: 1.45;
      border: 1px solid var(--border);
      background: var(--bot);
    }
    .row.user .bubble {
      color: #fff;
      background: var(--user);
      border-color: var(--user);
    }
    .meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
    }
    .composer {
      border-top: 1px solid var(--border);
      background: #fff;
      padding: 12px;
      display: flex;
      gap: 8px;
    }
    textarea {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 46px;
      max-height: 140px;
      resize: vertical;
      font: inherit;
      outline: none;
    }
    button {
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
      border-radius: 12px;
      padding: 0 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="shell">
      <div class="header">
        <div class="title">HomeEase Chatbot</div>
        <div class="badge">Connected</div>
      </div>
      <div id="chat" class="chat"></div>
      <div class="composer">
        <textarea id="input" placeholder="Type your query..."></textarea>
        <input id="image" type="file" accept="image/*" style="display:none" />
        <button id="pick">Image</button>
        <button id="send">Send</button>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const imageInput = document.getElementById('image');
    const pickBtn = document.getElementById('pick');
    const sendBtn = document.getElementById('send');

    function timeNow() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, sender, source) {
      const row = document.createElement('div');
      row.className = `row ${sender}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = source ? `${timeNow()} • ${source}` : timeNow();

      bubble.appendChild(meta);
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function updatePickButton() {
      const hasImage = !!(imageInput && imageInput.files && imageInput.files[0]);
      pickBtn.textContent = hasImage ? 'Image ✓' : 'Image';
    }

    async function sendMessage() {
      const message = input.value.trim();
      const file = imageInput && imageInput.files ? imageInput.files[0] : null;
      if (!message && !file) return;

      if (file && message) {
        addMessage(`${message}\n\n[Image attached: ${file.name}]`, 'user');
      } else if (file) {
        addMessage(`[Image attached: ${file.name}]`, 'user');
      } else {
        addMessage(message, 'user');
      }

      input.value = '';
      sendBtn.disabled = true;
      pickBtn.disabled = true;

      try {
        let res;
        if (file) {
          const formData = new FormData();
          if (message) formData.append('message', message);
          formData.append('image', file);
          res = await fetch('/api/chatbot/analyze-image-local', {
            method: 'POST',
            body: formData,
          });
        } else {
          res = await fetch('/api/chatbot/chat-local', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
          });
        }

        const data = await res.json();

        if (!data.success) {
          addMessage(data.message || 'Request failed.', 'bot');
          return;
        }

        const src = (data.sources && data.sources[0] && data.sources[0].category) || 'Assistant';
        addMessage(data.reply || 'No response returned.', 'bot', src);
      } catch (err) {
        addMessage('Network error. Make sure backend and Ollama are running.', 'bot');
      } finally {
        sendBtn.disabled = false;
        pickBtn.disabled = false;
        if (imageInput) imageInput.value = '';
        updatePickButton();
      }
    }

    pickBtn.addEventListener('click', () => {
      if (imageInput) imageInput.click();
    });

    imageInput.addEventListener('change', updatePickButton);

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    updatePickButton();

    addMessage(
      'Hello! I am your HomeEase local assistant. Type any home-service query.',
      'bot',
      'System'
    );
  </script>
</body>
</html>
